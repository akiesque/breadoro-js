<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breadoro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles\styles.css">
</head>
<body>
   <div class="main">
    <div class="timer-box">
        <h1>Breadoro</h1>
        <div class="alert alert-warning alert-dismissible bread-alert fade show" role="alert">
        <strong>You have a chance to earn bread after this session!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
         <div class="grid-container">
            <div class="pomodoro-timer">
                <p class="pomo-time">25:00</p>
            </div>
            <div class="timer-container hidden">
            
            </div>
            <p class="notify-text"></p>
        </div>
            
            <div class="settings-container">

                <div class="tooltip-session">
                <span>Sessions</span>
                <input id="sessions" placeholder="4">
                <span class="tooltip-text">Number of sessions you want to complete.</span>
                </div>

                <div class="tooltip-break">
                <span>Breaks</span>
                <input id="breaks" placeholder="5">
                <span class="tooltip-text">How long you want to take your break (in minutes).</span>
            </div>
        </div>

        <div class="settings-display hidden">
                <p id="display-sessions">Sessions:</p>
                <p id="display-breaks">Breaks:</p>
            </div>

        <div class="buttons">
            <button class="timer-btn" onclick="toggleTimerButton();">Start</button>
            <button id="reset-btn" onclick="restartTimer();">Reset</button>
            <button id="settings-btn" onclick="openSettings();">Settings</button>
        </div>

        <div id="settings-screen" class="modal hidden">
            <div class="modal-content">
                <p class = "settings-title">Settings</p>
                <input type="number" id="minutes" placeholder="25">
                <button class="close" onclick="closeSettings();">&times;</button>
            </div>
        </div>
    </div>

   </div>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts\timer.js"></script>
</body>
</html>
